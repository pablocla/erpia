
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--color-text-primary)}
.wrap{padding:1rem 0;display:flex;flex-direction:column;gap:24px}
.section{border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
.section-header{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;border-bottom:1px solid var(--color-border-tertiary)}
.section-header:hover{background:var(--color-background-secondary)}
.section-title{font-size:14px;font-weight:500}
.section-badge{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500}
.section-body{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;padding:14px;background:var(--color-background-secondary)}
.section-body.hidden{display:none}
.card{background:var(--color-background-primary);border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:12px;display:flex;flex-direction:column;gap:6px}
.card-title{font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px}
.card-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.card ul{list-style:none;padding:0}
.card ul li{font-size:11px;color:var(--color-text-secondary);padding:2px 0;border-bottom:1px solid var(--color-border-tertiary);line-height:1.5}
.card ul li:last-child{border-bottom:none}
.card ul li span.tag{font-size:10px;padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:500}
.tag-oblig{background:#EAF3DE;color:#3B6D11}
.tag-afip{background:#E6F1FB;color:#0C447C}
.tag-serie{background:#FAEEDA;color:#633806}
.tag-crit{background:#FCEBEB;color:#791F1F}
.tag-have{background:#E6F6EA;color:#1E6B3C}
.tag-miss{background:#FCEBEB;color:#791F1F}
.tag-partial{background:#FFF4D6;color:#8A5B0A}
.legend{display:flex;flex-wrap:wrap;gap:8px;padding:12px 0 4px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--color-text-secondary)}
.legend-tag{font-size:10px;padding:1px 5px;border-radius:4px;font-weight:500}
.chevron{font-size:12px;transition:transform 0.2s;color:var(--color-text-secondary)}
.chevron.open{transform:rotate(180deg)}
/* dark mode */
@media(prefers-color-scheme:dark){
.tag-oblig{background:#27500A;color:#C0DD97}
.tag-afip{background:#042C53;color:#B5D4F4}
.tag-serie{background:#412402;color:#FAC775}
.tag-crit{background:#501313;color:#F7C1C1}
.tag-have{background:#0F3B1E;color:#BCE7C9}
.tag-miss{background:#501313;color:#F7C1C1}
.tag-partial{background:#3C2A05;color:#F1D28A}
}
</style>

const colorDots={oblig:"#639922",afip:"#185FA5",serie:"#BA7517",crit:"#A32D2D"};

function tagHTML(tags){
 return tags.map(t=>{
    const map={oblig:"obligatorio",afip:"AFIP",serie:"serie/corr.",crit:"crítico",have:"tiene",miss:"falta",partial:"parcial"};
  return `<span class="tag tag-${t}">${map[t]}</span>`;
 }).join("");
}

function renderSection(s){
 let li=s.items.map(([label,tags])=>
  `<li>${label}${tagHTML(tags)}</li>`
 ).join("");
 return `<div class="card">
  <div class="card-title">${s.name}</div>
  <ul>${li}</ul>
 </div>`;
}

function renderModule(m,idx){
 let secs=m.sections.map(renderSection).join("");
 return `<div class="section">
  <div class="section-header" onclick="toggle(${idx})">
   <span class="section-title" style="color:${m.color}">${m.title}</span>
   <span style="display:flex;align-items:center;gap:8px">
    <span class="section-badge" style="background:${m.badgeColor};color:${m.badgeText}">${m.badge}</span>
    <span class="chevron" id="chev-${idx}">▼</span>
   </span>
  </div>
  <div class="section-body" id="body-${idx}">${secs}</div>
 </div>`;
}

function toggle(idx){
 const b=document.getElementById("body-"+idx);
 const c=document.getElementById("chev-"+idx);
 b.classList.toggle("hidden");
 c.classList.toggle("open");
}

const legend=`<div class="legend">
 <div class="legend-item"><span class="legend-tag tag-oblig">obligatorio</span> Campo requerido siempre</div>

 <div class="legend-item"><span class="legend-tag tag-partial">parcial</span> Implementación parcial / en curso</div>
 <div class="legend-item"><span class="legend-tag tag-miss">falta</span> No implementado todavía</div>
</div>`;
